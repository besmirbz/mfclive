<!DOCTYPE html>
<!-- MFCLIVE | © 2025 Besmir Pepa -->
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: transparent;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Barlow Condensed', 'Arial Black', Arial, sans-serif;
  }

  /* ── Animated pitch lines in background ── */
  .pitch {
    position: absolute;
    inset: 0;
    overflow: hidden;
    opacity: 0.045;
  }
  .pitch svg {
    width: 100%;
    height: 100%;
  }

  /* ── Radial glow from centre ── */
  .glow-centre {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 900px; height: 900px;
    background: radial-gradient(circle, rgba(61,130,246,0.12) 0%, transparent 70%);
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.7; transform: translate(-50%,-50%) scale(1); }
    50%       { opacity: 1;   transform: translate(-50%,-50%) scale(1.08); }
  }

  /* ── Subtle scanlines ── */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.06) 3px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
  }

  /* ── Thin animated top & bottom accent bars ── */
  .accent-top, .accent-bottom {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    background: linear-gradient(to right, transparent 0%, #3D82F6 30%, #7DB8F7 50%, #3D82F6 70%, transparent 100%);
    animation: shimmer 3s ease-in-out infinite;
  }
  .accent-top    { top: 0; }
  .accent-bottom { bottom: 0; }
  @keyframes shimmer {
    0%, 100% { opacity: 0.5; }
    50%       { opacity: 1; }
  }

  /* ── Centre content ── */
  .centre {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    animation: fadeIn 1.2s ease both;
    background: rgba(5, 11, 24, 0.82);
    border: 1px solid rgba(61, 130, 246, 0.18);
    border-radius: 16px;
    padding: 56px 80px 52px;
    box-shadow: 0 8px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(125,184,247,0.07);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translate(-50%, calc(-50% + 24px)); }
    to   { opacity: 1; transform: translate(-50%, -50%); }
  }

  /* Ball icon */
  .ball {
    font-size: 56px;
    margin-bottom: 28px;
    animation: ballFloat 3.5s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(61,130,246,0.5));
  }
  @keyframes ballFloat {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-10px); }
  }

  /* Branding */
  .brand {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: .35em;
    text-transform: uppercase;
    color: #3D82F6;
    margin-bottom: 20px;
  }

  /* Main heading */
  .main-text {
    font-size: 120px;
    font-weight: 900;
    color: #fff;
    letter-spacing: .04em;
    text-transform: uppercase;
    line-height: 0.95;
    text-align: center;
    text-shadow: 0 0 60px rgba(61,130,246,0.35), 0 4px 30px rgba(0,0,0,0.8);
    margin-bottom: 24px;
  }
  .main-text span {
    color: #3D82F6;
  }

  /* Sub text */
  .sub-text {
    font-family: 'Barlow', Arial, sans-serif;
    font-size: 22px;
    font-weight: 600;
    color: rgba(125, 184, 247, 0.65);
    letter-spacing: .18em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  /* Live indicator */
  .live-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(61,130,246,0.1);
    border: 1px solid rgba(61,130,246,0.25);
    border-radius: 100px;
    padding: 10px 24px;
  }
  .live-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #3D82F6;
    animation: livePulse 1.4s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(61,130,246,0.5); }
    50%       { opacity: 0.4; box-shadow: 0 0 0 6px rgba(61,130,246,0); }
  }
  .live-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .22em;
    color: #7DB8F7;
    text-transform: uppercase;
  }

  /* ── Corner logos (decorative) ── */
  .corner {
    position: absolute;
    width: 120px; height: 120px;
    opacity: 0.06;
  }
  .corner svg { width: 100%; height: 100%; }
  .corner-tl { top: 40px;  left: 40px; }
  .corner-tr { top: 40px;  right: 40px;  transform: scaleX(-1); }
  .corner-bl { bottom: 40px; left: 40px;   transform: scaleY(-1); }
  .corner-br { bottom: 40px; right: 40px;  transform: scale(-1,-1); }

  /* ── Left/right vertical rule lines ── */
  .rule {
    position: absolute;
    top: 80px; bottom: 80px;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(61,130,246,0.3) 30%, rgba(61,130,246,0.3) 70%, transparent);
  }
  .rule-l { left: 80px; }
  .rule-r { right: 80px; }

  /* ── Bottom credit ── */
  .credit {
    position: absolute;
    bottom: 22px;
    right: 90px;
    font-family: 'Barlow', Arial, sans-serif;
    font-size: 12px;
    color: rgba(125,184,247,0.18);
    letter-spacing: .12em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <!-- Pitch diagram background -->
  <div class="pitch">
    <svg viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#7DB8F7" stroke-width="2">
      <!-- Outer boundary -->
      <rect x="120" y="80" width="1680" height="920" rx="0"/>
      <!-- Centre line -->
      <line x1="960" y1="80" x2="960" y2="1000"/>
      <!-- Centre circle -->
      <circle cx="960" cy="540" r="180"/>
      <!-- Centre spot -->
      <circle cx="960" cy="540" r="5" fill="#7DB8F7"/>
      <!-- Goal areas - left -->
      <rect x="120" y="390" width="120" height="300"/>
      <!-- Goal areas - right -->
      <rect x="1680" y="390" width="120" height="300"/>
      <!-- Penalty areas - left -->
      <rect x="120" y="290" width="280" height="500"/>
      <!-- Penalty areas - right -->
      <rect x="1520" y="290" width="280" height="500"/>
      <!-- Penalty spots -->
      <circle cx="400" cy="540" r="5" fill="#7DB8F7"/>
      <circle cx="1520" cy="540" r="5" fill="#7DB8F7"/>
    </svg>
  </div>

  <div class="glow-centre"></div>
  <div class="scanlines"></div>
  <div class="accent-top"></div>
  <div class="accent-bottom"></div>
  <div class="rule rule-l"></div>
  <div class="rule rule-r"></div>

  <!-- Corner bracket decorations -->
  <div class="corner corner-tl">
    <svg viewBox="0 0 120 120" fill="none" stroke="#7DB8F7" stroke-width="3">
      <polyline points="40,10 10,10 10,40"/>
    </svg>
  </div>
  <div class="corner corner-tr">
    <svg viewBox="0 0 120 120" fill="none" stroke="#7DB8F7" stroke-width="3">
      <polyline points="40,10 10,10 10,40"/>
    </svg>
  </div>
  <div class="corner corner-bl">
    <svg viewBox="0 0 120 120" fill="none" stroke="#7DB8F7" stroke-width="3">
      <polyline points="40,10 10,10 10,40"/>
    </svg>
  </div>
  <div class="corner corner-br">
    <svg viewBox="0 0 120 120" fill="none" stroke="#7DB8F7" stroke-width="3">
      <polyline points="40,10 10,10 10,40"/>
    </svg>
  </div>

  <!-- Main content -->
  <div class="centre">
    <div class="ball">⚽</div>
    <div class="brand">MFCLIVE · Malmö Futsal Club</div>
    <div class="main-text">We'll Be<br><span>Right Back</span></div>
    <div class="sub-text">The stream will resume shortly</div>
    <div class="live-row">
      <div class="live-dot"></div>
      <div class="live-text">Reconnecting…</div>
    </div>
  </div>

  <div class="credit">© 2025 Besmir Pepa</div>

</body>
</html>
