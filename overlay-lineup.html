<!DOCTYPE html>
<!-- MFCLIVE | © 2025 Besmir Pepa -->
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: transparent;
    font-family: 'Arial Black', Arial, sans-serif;
    width: 1920px; height: 1080px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(1);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  body.ready { opacity: 1; }
  /* Overlay hidden — shrinks slightly and fades out */
  body.ov-hidden { opacity: 0 !important; transform: scale(0.97); pointer-events: none; }

  /* Full-screen semi-transparent backdrop — no blur, just rgba */
  .backdrop {
    position: absolute;
    inset: 0;
    background: rgba(5,11,24,0.60);
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 50px 100px;
  }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 40px;
  }
  .header-line { width: 180px; height: 2px; background: linear-gradient(to right, transparent, #3D82F6); }
  .header-line.right { background: linear-gradient(to left, transparent, #3D82F6); }
  .header-title { font-size: 30px; font-weight: 900; color: #7DB8F7; letter-spacing: .22em; text-transform: uppercase; }

  /* Logos row — centered between the two team panels */
  .teams-wrapper {
    display: flex;
    align-items: stretch;
    width: 100%;
    gap: 0;
  }

  /* Each team panel */
  .team-panel {
    flex: 1;
    background: rgba(5,11,24,0.52);
    border: 1px solid rgba(61,130,246,0.18);
    display: flex;
    flex-direction: column;
  }
  .player-list {
    flex: 1;
  }

  /* Team header row */
  .team-header {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    background: rgba(61,130,246,0.15);
    border-bottom: 1px solid rgba(61,130,246,0.2);
    gap: 0;
  }
  /* Home header: name right-aligned, logo on right */
  .team-panel.home .team-header { flex-direction: row-reverse; border-radius: 8px 0 0 0; }
  .team-panel.away .team-header { flex-direction: row;          border-radius: 0 8px 0 0; }

  .team-title {
    flex: 1;
    font-size: 30px; font-weight: 900;
    color: #fff; letter-spacing: .06em; text-transform: uppercase;
    text-shadow: 0 2px 6px rgba(0,0,0,.7);
  }
  .team-panel.home .team-title { text-align: right; padding-right: 0; }
  .team-panel.away .team-title { text-align: left;  padding-left: 0; }

  /* Logo centre column */
  .logo-col {
    width: 120px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    align-self: stretch;
  }
  .logo-header {
    height: 74px; /* matches team-header height */
    background: rgba(5,11,24,0.52);
    border: 1px solid rgba(61,130,246,0.18);
    border-left: none; border-right: none;
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    width: 100%;
  }
  .logo-col img {
    width: 50px; height: 50px;
    object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.6));
  }

  /* Player rows */
  .player-list { list-style: none; width: 100%; }
  .player-list li {
    display: flex;
    align-items: center;
    padding: 10px 24px;
    border-bottom: 1px solid rgba(61,130,246,0.1);
    font-size: 24px; font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .player-list li:last-child { border-bottom: none; }
  .player-list li.captain { color: #7DB8F7; }

  /* Home: name right, number left of center */
  .team-panel.home .player-list li { flex-direction: row-reverse; justify-content: flex-start; }
  .team-panel.away .player-list li { flex-direction: row; }

  .p-name { flex: 1; }
  .team-panel.home .p-name { text-align: right; }
  .team-panel.away .p-name { text-align: left; }

  .p-num {
    font-size: 19px; font-weight: 900;
    color: #3D82F6; letter-spacing: .05em;
    min-width: 36px;
  }
  .team-panel.home .p-num { text-align: left;  margin-left: 10px; }
  .team-panel.away .p-num { text-align: right; margin-right: 10px; }

  /* Logo centre player rows — just a filler stripe */
  .logo-col .player-row-filler {
    width: 100%;
    height: 42px; /* matches li height */
    border-bottom: 1px solid rgba(61,130,246,0.08);
    background: rgba(5,11,24,0.35);
    border-left: 1px solid rgba(61,130,246,.1);
    border-right: 1px solid rgba(61,130,246,.1);
  }
  .section-lbl {
    font-size: 11px; font-weight: 900;
    letter-spacing: .2em; text-transform: uppercase;
    color: rgba(61,130,246,.6);
    padding: 7px 24px 4px;
    border-bottom: 1px solid rgba(61,130,246,.08);
    background: rgba(5,11,24,.3);
  }
  .team-panel.home .section-lbl { text-align: right; }
  .team-panel.away .section-lbl { text-align: left; }
  /* Filler for logo column section labels */
  .logo-col .section-lbl-filler {
    width: 100%;
    height: 28px;
    border-bottom: 1px solid rgba(61,130,246,.08);
    background: rgba(5,11,24,.3);
    border-left: 1px solid rgba(61,130,246,.1);
    border-right: 1px solid rgba(61,130,246,.1);
  }
</style>
</head>
<body>
<div class="backdrop"></div>
<div class="content">
  <div class="header">
    <div class="header-line"></div>
    <div class="header-title">Team Lineup</div>
    <div class="header-line right"></div>
  </div>

  <div class="teams-wrapper">

    <!-- Home team (right-aligned) -->
    <div class="team-panel home" id="homePanel">
      <div class="team-header">
        <span class="team-title" id="homeName">MFC</span>
      </div>
      <ul class="player-list" id="homeList"></ul>
    </div>

    <!-- Centre logos column -->
    <div class="logo-col" id="logoCol">
      <div class="logo-header">
        <img id="homeLogoImg" src="/logo/home" onerror="this.style.opacity=0.3" />
        <img id="awayLogoImg" src="/logo/away" onerror="this.style.opacity=0.3" />
      </div>
      <!-- filler rows generated by JS -->
    </div>

    <!-- Away team (left-aligned) -->
    <div class="team-panel away" id="awayPanel">
      <div class="team-header">
        <span class="team-title" id="awayName">AWAY</span>
      </div>
      <ul class="player-list" id="awayList"></ul>
    </div>

  </div>
</div>
<script>
function parsePlayer(p) {
  const cap = p.includes('(C)');
  const clean = p.replace(' (C)', '').trim();
  const spaceIdx = clean.indexOf(' ');
  const num  = spaceIdx > 0 ? clean.slice(1, spaceIdx) : clean.slice(1);
  const name = spaceIdx > 0 ? clean.slice(spaceIdx+1) : '';
  return { num, name, cap };
}

function playerRow(p) {
  const { num, name, cap } = parsePlayer(p);
  return `<li class="${cap?'captain':''}">
    <span class="p-num">${num}</span>
    <span class="p-name">${name}${cap?' ©':''}</span>
  </li>`;
}

function renderList(ulId, starters, subs, subsLabel) {
  const ul = document.getElementById(ulId);
  if (!starters || !starters.length) { ul.innerHTML = ''; return 0; }
  let html = '';
  let rows = 0;
  // Show section labels only when subs are present
  if (subs && subs.length) {
    html += `<li class="section-lbl">Starting</li>`;
    rows++;
  }
  starters.forEach(p => { html += playerRow(p); rows++; });
  if (subs && subs.length) {
    html += `<li class="section-lbl">${subsLabel || 'Substitutes'}</li>`;
    rows++;
    subs.forEach(p => { html += playerRow(p); rows++; });
  }
  ul.innerHTML = html;
  return rows;
}

function syncLogoColFiller(count) {
  const logocol = document.getElementById('logoCol');
  logocol.querySelectorAll('.player-row-filler').forEach(el => el.remove());
  for (let i = 0; i < count; i++) {
    const div = document.createElement('div');
    div.className = 'player-row-filler';
    logocol.appendChild(div);
  }
}

// ── Audio ─────────────────────────────────────────────────────────────────────
function fadeAudio(audio, toVol, durationMs) {
  clearInterval(audio._fadeTimer);
  const steps = Math.max(1, Math.round(durationMs / 16));
  const fromVol = audio.volume;
  let step = 0;
  audio._fadeTimer = setInterval(() => {
    step++;
    audio.volume = Math.max(0, Math.min(1, fromVol + (toVol - fromVol) * (step / steps)));
    if (step >= steps) {
      clearInterval(audio._fadeTimer);
      if (toVol === 0) audio.pause();
    }
  }, durationMs / steps);
}
const fanfareAudio    = new Audio('/audio/lineup-fanfare.mp3');
fanfareAudio.volume   = 0;
let wasLineupVisible  = false;

let _sseDelay = 1000;
function connectSSE() {
  const es = new EventSource('/events');
  es.onopen  = () => { _sseDelay = 1000; };
  es.onerror = () => { es.close(); setTimeout(connectSSE, _sseDelay); _sseDelay = Math.min(_sseDelay * 2, 30000); };
  es.onmessage = e => {
  const d = JSON.parse(e.data);
  if (d.type !== 'state') return;

  document.getElementById('homeName').textContent = d.homeTeam;
  document.getElementById('awayName').textContent = d.awayTeam;

  // Use split starters/subs from FOGIS if available, fall back to flat lineup for manual edits
  const homeStarters = d.homeStarters && d.homeStarters.length ? d.homeStarters : d.lineup.home;
  const homeSubs     = d.homeStarters && d.homeStarters.length ? (d.homeSubs || []) : [];
  const awayStarters = d.awayStarters && d.awayStarters.length ? d.awayStarters : d.lineup.away;
  const awaySubs     = d.awayStarters && d.awayStarters.length ? (d.awaySubs || []) : [];

  const homeRows = renderList('homeList', homeStarters, homeSubs, d.homeSepLabel);
  const awayRows = renderList('awayList', awayStarters, awaySubs, d.awaySepLabel);
  syncLogoColFiller(Math.max(homeRows, awayRows));

  // Logo refresh
  const hl = document.getElementById('homeLogoImg');
  const al = document.getElementById('awayLogoImg');
  if (d.homeLogo && hl.dataset.src !== d.homeLogo) { hl.dataset.src=d.homeLogo; hl.src='/logo/home?t='+Date.now(); }
  if (d.awayLogo && al.dataset.src !== d.awayLogo) { al.dataset.src=d.awayLogo; al.src='/logo/away?t='+Date.now(); }

  const ovVisible = d.overlayVisible?.lineup !== false;
  if (ovVisible) { document.body.classList.add('ready'); document.body.classList.remove('ov-hidden'); }
  else           { document.body.classList.add('ov-hidden'); }

  if (ovVisible && !wasLineupVisible) {
    fanfareAudio.currentTime = 0;
    fanfareAudio.volume = 0;
    fanfareAudio.play().catch(() => {});
    fadeAudio(fanfareAudio, 0.8, 400);
  } else if (!ovVisible && wasLineupVisible) {
    fadeAudio(fanfareAudio, 0, 600);
  }
  wasLineupVisible = ovVisible;
  };
}
connectSSE();
</script>
</body>
</html>
